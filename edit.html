<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CSV Search</title>
<style>
body { font-family: Arial; padding: 20px; }
input { padding: 8px; width: 300px; }
button { padding: 8px; }
table { border-collapse: collapse; margin-top: 15px; }
td, th { border: 1px solid #ccc; padding: 6px 10px; }
</style>
</head>
<body>

<h2>CSV Search</h2>

<input type="text" id="searchInput" placeholder="Enter search text">
<button onclick="searchData()">Search</button>

<table id="resultTable"></table>

<script>
const csvUrl = "https://raw.githubusercontent.com/nitin-atri/csv-data/refs/heads/main/data.csv"; // <-- CHANGE THIS
let csvData = [];

fetch(csvUrl)
.then(response => response.text())
.then(data => {
    csvData = data.trim().split("\n").map(row => row.split(","));
})
.catch(error => {
    alert("Error loading CSV. Check raw link or internet.");
});

function searchData() {
    const keyword = document.getElementById("searchInput").value.toLowerCase();
    const table = document.getElementById("resultTable");
    table.innerHTML = "";

    if (!keyword) return;

    let count = 0;

    csvData.forEach(row => {
        if (row.join(" ").toLowerCase().includes(keyword) && count < 5) {
            const tr = document.createElement("tr");
            row.forEach(cell => {
                const td = document.createElement("td");
                td.textContent = cell;
                tr.appendChild(td);
            });
            table.appendChild(tr);
            count++;
        }
    });

    if (count === 0) {
        table.innerHTML = "<tr><td>No results found</td></tr>";
    }
}
</script>

</body>
</html>
